name: PhysLab AI CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run full project quality check
        run: python quality_check.py

      - name: Build Docker image
        run: docker build -t physlab-ai:ci .

      - name: Start container
        run: |
          docker run -d             --name physlab-ai-ci             -p 8501:8501             physlab-ai:ci

      - name: Check Streamlit health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent               http://127.0.0.1:8501/_stcore/health; then
              echo
              echo "PhysLab AI container is healthy."
              exit 0
            fi
            sleep 2
          done

          echo "Container did not become healthy."
          docker logs physlab-ai-ci
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs physlab-ai-ci || true

      - name: Stop container
        if: always()
        run: docker rm -f physlab-ai-ci || true
